---
name: Docker Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Run tests
      run: uv run pytest

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        load: true
        tags: closing-labels:test

    - name: Smoke test — entrypoint exits non-zero on missing env
      run: |
        output=$(docker run --rm closing-labels:test 2>&1 || true)
        echo "$output"
        echo "$output" | grep -q "INPUT_OWNER is not set"
