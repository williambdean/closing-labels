---
name: Docker Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Run tests
      run: uv run pytest

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        load: true
        tags: closing-labels:test

    - name: Smoke test — entrypoint exits non-zero on missing env
      run: |
        output=$(docker run --rm closing-labels:test 2>&1 || true)
        echo "$output"
        echo "$output" | grep -q "INPUT_OWNER is not set"

    - name: End-to-end dry-run against fixture PR
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        docker run --rm \
          -e GH_TOKEN \
          -e INPUT_OWNER=williambdean \
          -e INPUT_REPO=closing-labels \
          -e INPUT_PR_NUMBER=21 \
          -e INPUT_DRY_RUN=true \
          closing-labels:test
